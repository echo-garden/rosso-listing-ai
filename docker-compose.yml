services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rosso_listing_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rosso_listing_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rosso_listing_ai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
